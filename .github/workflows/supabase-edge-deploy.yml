name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Function to deploy"
        required: true
        default: "task-operations"
        type: choice
        options:
          - task-operations
          - leaderboard
          - claim_daily_reward
          - award_xp
          - spend_xp
          - spend_bix
          - recalc_level
          - convert_xp_to_bix
          - staking
          - all
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-edge-deploy.yml"

permissions:
  contents: read

concurrency:
  group: supabase-edge-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve deployment target
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Edge Function(s)
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          PROJECT_REF="${SUPABASE_PROJECT_REF:-ibcckhhwysqhgbkyodwl}"
          TARGET="${{ steps.resolve.outputs.target }}"

          echo "Using project ref: $PROJECT_REF"
          echo "Target: $TARGET"

          if [ "$TARGET" = "all" ]; then
            mapfile -t FUNCTIONS < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^_shared$' | sort)
            if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
              echo "No functions found in supabase/functions"
              exit 1
            fi

            for fn in "${FUNCTIONS[@]}"; do
              echo "Deploying $fn"
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            done
          else
            supabase functions deploy "$TARGET" --project-ref "$PROJECT_REF"
          fi
